<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Main Background -->
  <rect width="512" height="512" rx="115" fill="#000000"/>

  <!-- Pocket Wallet Shape -->
  <g transform="translate(256, 256)">
    <!-- Main Pocket Body -->
    <path d="M -120 -80 L -120 60 Q -120 100 -80 100 L 80 100 Q 120 100 120 60 L 120 -80 Q 120 -120 80 -120 L -80 -120 Q -120 -120 -120 -80 Z"
          fill="#FFFFFF"/>

    <!-- Pocket Opening Shadow -->
    <ellipse cx="0" cy="-80" rx="120" ry="25" fill="#E0E0E0"/>

    <!-- Pocket Opening -->
    <path d="M -110 -80 Q 0 -50 110 -80"
          stroke="#000000"
          stroke-width="8"
          stroke-linecap="round"
          fill="none"/>

    <!-- Minimalist Coin/Token Symbol -->
    <circle cx="0" cy="10" r="45" fill="#000000"/>
    <text x="0" y="25" font-family="Arial, sans-serif" font-size="50" font-weight="bold" fill="#FFFFFF" text-anchor="middle">P</text>
  </g>

  <!-- Subtle Border -->
  <rect width="512" height="512" rx="115" fill="none" stroke="#333333" stroke-width="4"/>
</svg>